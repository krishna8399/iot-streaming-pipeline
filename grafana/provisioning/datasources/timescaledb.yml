apiVersion: 1

datasources:
  - name: TimescaleDB
    uid: timescaledb-iot
    type: postgres
    access: proxy
    url: timescaledb:5432
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1500
      timescaledb: true
    editable: false
    isDefault: true
