# ============================================================
# IoT Streaming Pipeline — docker-compose.yml
# IU Internationale Hochschule — DLMDSEDE02
#
# Services (9):
#   kafka (KRaft — no Zookeeper), spark-master, spark-worker,
#   spark-streaming, timescaledb, grafana, kafka-ui,
#   producer, api
#
# All services share the pipeline-net bridge network.
# Named volumes prevent data loss across restarts.
# Health-checks enforce strict startup ordering.
# ============================================================

networks:
  pipeline-net:
    driver: bridge
    name: pipeline-net

volumes:
  timescaledb-data:
  grafana-data:
  kafka-data:

# ---------------------------------------------------------------------------
# LAYER 1 — MESSAGE BUS
# ---------------------------------------------------------------------------
services:

  # ── Kafka broker (KRaft mode — no Zookeeper) ──────────────────────────────
  # KRaft embeds the controller quorum inside the broker process (Kafka 3.3+).
  # ADVERTISED_LISTENERS:
  #   PLAINTEXT      → kafka:9092   (container-to-container)
  #   PLAINTEXT_HOST → localhost:29092 (host-side tooling, e.g. kcat)
  #   CONTROLLER     → kafka:9093   (internal KRaft controller traffic only)
  #
  # CLUSTER_ID must be a fixed base64url-encoded 16-byte UUID so the
  # volume survives container restarts without re-formatting.
  kafka:
    image: apache/kafka:3.9.0
    container_name: kafka
    restart: unless-stopped
    networks:
      - pipeline-net
    ports:
      - "9092:9092"       # PLAINTEXT — containers
      - "29092:29092"     # PLAINTEXT_HOST — host tooling
    volumes:
      - kafka-data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      # LISTENERS: use container hostname for PLAINTEXT + CONTROLLER (not 0.0.0.0),
      # only PLAINTEXT_HOST binds to 0.0.0.0 so the host machine can reach it.
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Replication/ISR — single broker, RF=1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data

      # Fixed cluster ID — keeps storage consistent across restarts
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      # Kafka binds to the container hostname 'kafka', not localhost
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

# ---------------------------------------------------------------------------
# LAYER 2 — STREAM PROCESSING (Spark)
# ---------------------------------------------------------------------------

  # ── Spark master ──────────────────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.5
    container_name: spark-master
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    restart: unless-stopped
    networks:
      - pipeline-net
    ports:
      - "4040:8080"   # Spark Web UI  (internal 8080 → host 4040)
      - "7077:7077"   # Spark master RPC port
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_MASTER_OPTS: "-Dspark.deploy.defaultCores=2"
    healthcheck:
      # Spark RPC binds to the container IP, not 127.0.0.1.
      # Check the Web UI (8080) which binds to 0.0.0.0 instead.
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/localhost/8080"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Spark worker ──────────────────────────────────────────────────────────
  # Must use the same custom image as spark-streaming so the Kafka + JDBC
  # JARs are on the executor classpath. A classpath mismatch causes
  # ClassCastException when the driver serialises tasks to the worker.
  spark-worker:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-worker
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    restart: unless-stopped
    networks:
      - pipeline-net
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: 2
      SPARK_NO_DAEMONIZE: "true"

  # ── Spark Structured Streaming job ────────────────────────────────────────
  # Built from spark/Dockerfile; submits streaming_job.py to the master.
  # Waits for Kafka AND TimescaleDB to be healthy before starting.
  spark-streaming:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: spark-streaming
    restart: on-failure
    networks:
      - pipeline-net
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_started
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-sensor-data}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-sensor-data-dlq}
      POSTGRES_USER: ${POSTGRES_USER:-pipeline_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-iot_sensors}
      SPARK_MASTER_URL: spark://spark-master:7077

# ---------------------------------------------------------------------------
# LAYER 3 — STORAGE
# ---------------------------------------------------------------------------

  # ── TimescaleDB ───────────────────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: timescaledb
    restart: unless-stopped
    networks:
      - pipeline-net
    ports:
      - "5432:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pipeline_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-iot_sensors}
      # Tune for time-series workloads
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pipeline_user} -d ${POSTGRES_DB:-iot_sensors}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

# ---------------------------------------------------------------------------
# LAYER 4 — VISUALISATION
# ---------------------------------------------------------------------------

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - pipeline-net
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Allow Grafana to read from TimescaleDB
      GF_DATABASE_TYPE: sqlite3
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource

  # ── Kafka UI ──────────────────────────────────────────────────────────────
  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    networks:
      - pipeline-net
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"

# ---------------------------------------------------------------------------
# LAYER 5 — DATA SOURCE & DELIVERY
# ---------------------------------------------------------------------------

  # ── Python Kafka producer ─────────────────────────────────────────────────
  producer:
    build:
      context: ./producer
      dockerfile: Dockerfile
    container_name: producer
    restart: on-failure
    networks:
      - pipeline-net
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro          # Kaggle CSV lives here; read-only in container
    environment:
      KAFKA_BROKER: ${KAFKA_BROKER:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-sensor-data}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-sensor-data-dlq}
      PRODUCER_DELAY_MS: ${PRODUCER_DELAY_MS:-100}
      PRODUCER_BATCH_SIZE: ${PRODUCER_BATCH_SIZE:-10}
      PRODUCER_ANOMALY_RATE: ${PRODUCER_ANOMALY_RATE:-0.05}
      PRODUCER_DATA_FILE: ${PRODUCER_DATA_FILE:-/app/data/sensor_data.csv}

  # ── FastAPI REST server ───────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    restart: unless-stopped
    networks:
      - pipeline-net
    depends_on:
      timescaledb:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pipeline_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-iot_sensors}
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
